<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Inka</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
text-align:center;
color:white;
overflow:hidden;
}

.container{
margin-top:80px;
padding:20px;
}

h1{
font-size:50px;
}

h2{
margin-top:-10px;
}

.message{
max-width:600px;
margin:auto;
font-size:18px;
line-height:1.6;
}

.cake{
font-size:120px;
margin:20px;
}

.candle{
font-size:40px;
display:block;
}

button{
margin:10px;
padding:12px 25px;
border:none;
border-radius:10px;
background:white;
color:#ff4f81;
font-size:16px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.heart{
position:absolute;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday 🎉</h1>

<h2>Nurhajijah (Inka)</h2>

<div class="cake">
🎂
<span id="flame" class="candle">🔥</span>
</div>

<p class="message">
Semoga dengan bertambahnya umur kamu bisa menjadi pribadi
yang lebih baik lagi. Semoga panjang umur, sehat selalu,
dan semua harapan baikmu bisa tercapai.
</p>

<p class="message">
Semoga hari ini penuh kebahagiaan,
tawa, dan momen indah bersama orang-orang yang kamu sayangi.
</p>

<button onclick="blowCandle()">Tiup Lilin 🎂</button>
<button onclick="playMusic()">Putar Musik 🎵</button>

<audio id="music">
<source src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function playMusic(){
document.getElementById("music").play();
}

function blowCandle(){
document.getElementById("flame").style.display="none";
alert("Yay! Lilinnya sudah ditiup 🎉");
}

function createHearts(){
for(let i=0;i<50;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(4+Math.random()*4)+"s";
heart.style.top="-10px";
document.body.appendChild(heart);
}
}

createHearts();

</script>

</body>
</html>
