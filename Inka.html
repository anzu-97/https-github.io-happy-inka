<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Inka</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    padding:50px;
    color:#333;
}

.card{
    background:white;
    padding:40px;
    border-radius:15px;
    max-width:500px;
    margin:auto;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
}

button{
    background:#ff4d6d;
    border:none;
    padding:12px 20px;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#e63e5c;
}
</style>
</head>

<body>

<div class="card">
<h1>🎉 Happy Birthday 🎂</h1>

<h2>Nurhajijah (Inka)</h2>

<p>
Semoga dengan bertambahnya umur, kamu bisa menjadi pribadi yang
lebih baik lagi. Semoga panjang umur, sehat selalu,
dan semua harapan baikmu bisa tercapai.
</p>

<p>
Semoga hari ini penuh kebahagiaan, tawa,
dan momen indah bersama orang-orang yang kamu sayangi.
</p>

<button onclick="playMusic()">Putar Musik 🎵</button>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3"></audio>

</div>

<script>
function playMusic(){
    document.getElementById("music").play();
}
</script>

</body>
</html>
